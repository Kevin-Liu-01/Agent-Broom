      <rect x="14" y="14" width="484" height="484" rx="112" fill="white"/>
      <path d="M142 222L148 236L162 242L148 248L142 262L136 248L122 242L136 236Z" fill="black"/>
      <path d="M188 183L193 195L205 200L193 205L188 217L183 205L171 200L183 195Z" fill="black"/>
      <path d="M190 257L194 267L204 271L194 275L190 285L186 275L176 271L186 267Z" fill="black"/>
      <g transform="rotate(28 256 256)" fill="black">
        <rect x="246" y="88" width="24" height="276" rx="12"/>
        <rect x="228" y="337" width="60" height="34" rx="17"/>
        <path d="M178 371C196 344 232 334 266 346L324 367C315 406 276 436 228 438C201 439 178 432 163 417C179 422 197 419 211 408C191 411 172 407 156 396C174 398 194 391 208 378C195 381 183 379 178 371Z"/>
