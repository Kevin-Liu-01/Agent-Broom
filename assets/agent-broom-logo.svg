<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Agent Broom frosted glass logo</title>
  <defs>
    <linearGradient id="glass" x1="72" y1="52" x2="450" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FCFF" stop-opacity="0.92"/>
      <stop offset="0.42" stop-color="#C8E5F7" stop-opacity="0.62"/>
      <stop offset="1" stop-color="#7F9FB7" stop-opacity="0.42"/>
    </linearGradient>
    <linearGradient id="edge" x1="88" y1="72" x2="432" y2="452" gradientUnits="userSpaceOnUse">
